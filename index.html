<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Zibah</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffeef1 0%, #ffd1dc 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --primary: #ff4b6e;
            --text: #2c2c2c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        /* Glassmorphism Quiz Card */
        .quiz-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(255, 75, 110, 0.1);
            width: 90%;
            max-width: 420px;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .options-container.show {
            opacity: 1;
        }

        .btn {
            background: white;
            border: none;
            color: var(--text);
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255, 75, 110, 0.15);
        }

        .btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 75, 110, 0.2);
            border-color: transparent;
        }

        /* Finale Screen Stage */
        .finale-container {
            display: none;
            opacity: 0;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            background: linear-gradient(to bottom, #ffeef1 40%, #fff 70%, #dcf5db 100%);
            transition: opacity 1.5s ease;
            z-index: 5;
        }

        .heart-glow {
            position: absolute;
            top: 7vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px rgba(255,75,110,0.6));
            animation: pulse 1.5s infinite alternate ease-in-out;
            z-index: 6;
        }

        .personal-msg {
            position: absolute;
            top: 20vh;
            width: 85%;
            left: 7.5%;
            text-align: center;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            color: #4a4a4a;
            z-index: 9;
        }

        .personal-msg span {
            display: block;
            font-size: 0.95rem;
            font-weight: 400;
            color: #7a7a7a;
            margin-top: 8px;
            font-style: italic;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1); }
        }

        .illustration-container {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 7;
        }

        /* 👫 Hand-Holding Silhouette Vector Graphic */
        .couple-svg {
            width: 110px;
            height: auto;
            fill: #222222;
        }

        .tulip-field {
            width: 100%;
            height: 150px;
            position: absolute;
            bottom: 0;
            left: 0;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 5px;
            overflow: hidden;
            z-index: 8;
        }

        .tulip-svg {
            width: 24px;
            height: 70px;
            transform-origin: bottom center;
            animation: windSway 3.5s ease-in-out infinite alternate;
        }

        @keyframes windSway {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(4deg); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            opacity: 0.7;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-10vh) translateX(50px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mp3">
    </audio>

    <div class="quiz-card" id="quizCard">
        <h2 id="questionText"></h2>
        <div class="options-container" id="optionsContainer"></div>
    </div>

    <div class="finale-container" id="finalePage">
        <div class="heart-glow">❤️</div>
        
        <div class="personal-msg" id="finaleText"></div>
        
        <div class="illustration-container">
            <svg class="couple-svg" viewBox="0 0 100 100">
                <circle cx="35" cy="25" r="7.5"/>
                <path d="M25,37 c0,-2 1.5,-3.5 3.5,-3.5 h13 c2,0 3.5,1.5 3.5,3.5 v22 h-4 v30 h-5 v-30 h-2 v30 h-5 v-30 h-4 z"/>
                <circle cx="65" cy="26" r="7"/>
                <path d="M57,37 c0,-2 1.5,-3.5 3.5,-3.5 h9 c2,0 3.5,1.5 3.5,3.5 v16 l4.5,24 h-6 v15 h-5 v-15 h-5 v-15 h-5 v-15 l4.5,-24 z"/>
                <path d="M44.5,47.5 Q50,53 57.5,47.5" stroke="#222222" stroke-width="4" stroke-linecap="round" fill="none" />
            </svg>
        </div>

        <div class="tulip-field" id="tulipField"></div>
    </div>

    <script>
        const quizData = [
            {
                question: "Choose the correct vibe for the rest of today:",
                options: ["Soft life only ✨", "100% spoiled 👑", "Pure premium energy 🔋"]
            },
            {
                question: "Rate your experience with me so far:",
                options: ["5 Stars (Highly recommend) ⭐", "10/10 would do again 📈", "Lock in this subscription permanently 🔒"]
            },
            {
                question: "Last question... Ready to see what's waiting for you?",
                options: ["Reveal the magic ✨"]
            }
        ];

        let currentStep = 0;
        const quizCard = document.getElementById('quizCard');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const finalePage = document.getElementById('finalePage');
        const tulipField = document.getElementById('tulipField');
        const bgMusic = document.getElementById('bgMusic');

        function typeWriter(text, i, callback) {
            if (i < text.length) {
                questionText.innerHTML = text.substring(0, i + 1);
                setTimeout(() => {
                    typeWriter(text, i + 1, callback);
                }, 40);
            } else if (typeof callback == 'function') {
                callback();
            }
        }

        function loadQuestion() {
            optionsContainer.classList.remove('show');
            optionsContainer.innerHTML = "";
            
            typeWriter(quizData[currentStep].question, 0, () => {
                quizData[currentStep].options.forEach(option => {
                    const button = document.createElement('button');
                    button.classList.add('btn');
                    button.innerText = option;
                    button.addEventListener('click', handleNext);
                    optionsContainer.appendChild(button);
                });
                optionsContainer.classList.add('show');
            });
        }

        function handleNext() {
            currentStep++;
            if (currentStep < quizData.length) {
                loadQuestion();
            } else {
                showFinale();
            }
        }

        const tulipSVGSource = `
            <svg class="tulip-svg" viewBox="0 0 24 80">
                <path d="M12,10 C6,10 4,16 4,22 C4,28 8,32 12,35 C16,32 20,28 20,22 C20,16 18,10 12,10 Z" fill="TARGET_COLOR"/>
                <path d="M12,12 C9,14 8,18 9,22 C10,26 12,28 12,28 C12,28 14,26 15,22 C16,18 15,14 12,12 Z" fill="rgba(0,0,0,0.1)"/>
                <path d="M12,34 L12,80" stroke="#52b788" stroke-width="2.5" fill="none"/>
                <path d="M12,50 Q18,45 17,38 Q14,43 12,50" fill="#52b788"/>
            </svg>
        `;

        const tulipColors = ['#ff4b6e', '#ff6b8b', '#ff8fa3', '#ffb3c1', '#fa3e5f'];

        function showFinale() {
            // Unlocks audio stream smoothly on physical tap interaction
            bgMusic.play().catch(e => console.log("Audio routing ready"));

            quizCard.style.transform = 'scale(0.8)';
            quizCard.style.opacity = '0';
            
            setTimeout(() => {
                quizCard.style.display = 'none';
                
                const count = Math.floor(window.innerWidth / 16);
                for (let i = 0; i < count; i++) {
                    const wrapper = document.createElement('div');
                    const randomColor = tulipColors[Math.floor(Math.random() * tulipColors.length)];
                    
                    let html = tulipSVGSource.replace('TARGET_COLOR', randomColor);
                    wrapper.innerHTML = html;
                    const svg = wrapper.querySelector('svg');
                    
                    svg.style.height = `${55 + Math.random() * 35}px`;
                    svg.style.animationDelay = `${Math.random() * 1.5}s`;
                    svg.style.animationDuration = `${3 + Math.random() * 1.5}s`;
                    
                    tulipField.appendChild(svg);
                }

                createAtmosphere();

                const finaleTextContainer = document.getElementById('finaleText');
                finaleTextContainer.innerHTML = "Always raising the bar for you, Zibah. <br><span>The beautiful daughter of Zion, pretty and yet still annoying. ❤️</span>";

                finalePage.style.display = 'block';
                setTimeout(() => {
                    finalePage.style.opacity = '1';
                }, 50);
            }, 600);
        }

        function createAtmosphere() {
            const symbols = ['🌸', '✨', '❤️', '💕'];
            setInterval(() => {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                p.style.left = `${Math.random() * 100}vw`;
                p.style.fontSize = `${12 + Math.random() * 14}px`;
                p.style.animationDuration = `${5 + Math.random() * 4}s`;
                finalePage.appendChild(p);
                setTimeout(() => p.remove(), 8000);
            }, 350);
        }

        loadQuestion();
    </script>
</body>
</html>
